<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thyemleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .btn-custom {
            background: #764ba2;
            color: white;
            border-radius: 25px;
            padding: 10px;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            background: #5a3782;
            color: white;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="card login-card p-4">
            <div class="card-body">
                <h3 class="text-center mb-4 fw-bold text-dark">Bem-vindo</h3>
                <p class="text-center text-muted mb-4">Acesse sua conta para continuar</p>

                <form method="post" th:action="@{/login}">
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold">Usuário</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small fw-bold">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom fw-bold">ENTRAR</button>
                    </div>
                </form>
                <br />
                <hr />
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-custom fw-bold">Entrar com Google</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
